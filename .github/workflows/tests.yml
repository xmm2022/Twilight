name: Tests

on:
  push:
    branches: [ main, golang, develop ]
  pull_request:
    branches: [ main, golang, develop ]

jobs:
  go-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        go-version: ['1.25.10']

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Verify dependencies
      run: go mod verify

    - name: Run go vet
      run: go vet ./...

    - name: Run tests
      run: go test ./... -v -race -count=1

    - name: Build binary
      run: go build -o bin/twilight ./cmd/twilight

  go-security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25.10'
        cache: true

    - name: Install govulncheck
      # Pin 到具体版本而非 @latest，避免工具升级让历史 commit
      # 在新 CVE-DB 下 hard-fail。
      # 升级流程：先在本地跑 govulncheck@<新版本>./... 通过后再改这里。
      run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

    - name: Run govulncheck
      run: govulncheck ./...

    - name: Run go vet
      run: go vet ./...

  nix:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install Nix
      uses: cachix/install-nix-action@v31

    - name: Check flake outputs
      run: nix flake show --no-write-lock-file

    - name: Smoke test dev shell
      run: |
        nix develop --no-write-lock-file --command bash -lc 'go version && node --version && pnpm --version'

  # 前端 lint / type-check / build
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webui
    steps:
    - uses: actions/checkout@v6

    - name: Setup pnpm
      # 不传 version，让 action 从 webui/package.json 的 packageManager 字段读，
      # 与本地 corepack / docs / Nix 保持单一事实源。
      uses: pnpm/action-setup@v6
      with:
        package_json_file: webui/package.json

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        # 通过 .nvmrc 锁版本，docs/INSTALL.md / flake.nix / 本地 nvm 全部对齐
        node-version-file: webui/.nvmrc
        cache: 'pnpm'
        cache-dependency-path: webui/pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Lint
      run: pnpm lint

    - name: Type check
      run: pnpm exec tsc --noEmit

    - name: Build
      run: pnpm build
      env:
        NEXT_TELEMETRY_DISABLED: '1'

    - name: Audit (high+ fails)
      run: pnpm audit --audit-level=high --prod
