name: Tests

on:
  push:
    branches: [ main, golang, develop ]
  pull_request:
    branches: [ main, golang, develop ]

# 最小权限：CI 只需读取仓库内容。显式收口避免默认的宽松 GITHUB_TOKEN 权限
# （写 contents / packages / id-token 等）被某个被攻陷的第三方 action 滥用。
permissions:
  contents: read

# 同一分支 / PR 的新推送取消仍在跑的旧运行，省 runner 配额也避免过期结果。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        go-version: ['1.25.10']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Verify dependencies
      run: go mod verify

    - name: Run go vet
      run: go vet ./...

    - name: Run tests
      run: go test ./... -v -count=1

    - name: Run race tests
      if: matrix.os == 'ubuntu-latest'
      run: go test ./... -v -race -count=1

    - name: Create build output directory
      shell: bash
      run: mkdir -p bin

    - name: Build binary
      run: go build -o bin/twilight ./cmd/twilight

  go-security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.10'
        cache: true

    - name: Install govulncheck
      # Pin 到具体版本而非 @latest，避免工具升级让历史 commit
      # 在新 CVE-DB 下 hard-fail。
      # 升级流程：先在本地跑 govulncheck@<新版本>./... 通过后再改这里。
      run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

    - name: Run govulncheck
      run: govulncheck ./...

    - name: Check gofmt
      # 仓库以 LF 存储 Go 源码（.gitattributes / autocrlf），ubuntu runner 检出即 LF，
      # 因此这里的 gofmt 不会被 CRLF 噪声干扰。任何未格式化的文件都会被列出并 fail。
      run: |
        unformatted=$(gofmt -l .)
        if [ -n "$unformatted" ]; then
          echo "以下文件未通过 gofmt，请运行 gofmt -w 后重新提交："
          echo "$unformatted"
          exit 1
        fi

    - name: Run go vet
      run: go vet ./...

    - name: Check routes vs docs drift
      # routes.go 注册的每条 (METHOD, PATH) 必须在 docs/*.md 里出现一次，
      # 或在 scripts/docs_drift_baseline.txt 里被显式 grandfather。新增路由
      # 偷懒不写 docs 会在 PR diff 上看见 baseline 增长，复审者可一眼发现。
      # 只在 Ubuntu 跑一份；脚本是纯文本扫描，无平台差异。
      run: go run ./scripts/check_docs_drift.go

  nix:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Nix
      uses: cachix/install-nix-action@v31

    - name: Check flake outputs
      run: nix flake show --no-write-lock-file

    - name: Smoke test dev shell
      run: |
        nix develop --no-write-lock-file --command bash -lc 'go version && node --version && pnpm --version'

  # 前端 lint / type-check / build
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webui
    steps:
    - uses: actions/checkout@v4

    - name: Setup pnpm
      # 不传 version，让 action 从 webui/package.json 的 packageManager 字段读，
      # 与本地 corepack / docs / Nix 保持单一事实源。
      uses: pnpm/action-setup@v4
      with:
        package_json_file: webui/package.json

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        # 通过 .nvmrc 锁版本，docs/INSTALL.md / flake.nix / 本地 nvm 全部对齐
        node-version-file: webui/.nvmrc
        cache: 'pnpm'
        cache-dependency-path: webui/pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Lint
      run: pnpm lint

    - name: Type check
      run: pnpm exec tsc --noEmit

    - name: Build
      run: pnpm build
      env:
        NEXT_TELEMETRY_DISABLED: '1'

    - name: Audit (high+ fails)
      run: pnpm audit --registry=https://registry.npmjs.org --audit-level=high --prod
