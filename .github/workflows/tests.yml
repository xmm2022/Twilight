name: Tests

on:
  push:
    branches: [ main, golang, develop ]
  pull_request:
    branches: [ main, golang, develop ]

jobs:
  go-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        go-version: ['1.25.10']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Verify dependencies
      run: go mod verify

    - name: Run go vet
      run: go vet ./...

    - name: Run tests
      run: go test ./... -v -race -count=1

    - name: Build binary
      run: go build -o bin/twilight ./cmd/twilight

  go-security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.10'
        cache: true

    - name: Install govulncheck
      run: go install golang.org/x/vuln/cmd/govulncheck@latest

    - name: Run govulncheck
      run: govulncheck ./...

    - name: Run go vet
      run: go vet ./...

  nix:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Nix
      uses: cachix/install-nix-action@v31

    - name: Check flake outputs
      run: nix flake show --no-write-lock-file

    - name: Smoke test dev shell
      run: |
        nix develop --no-write-lock-file --command bash -lc 'go version && node --version && pnpm --version'
