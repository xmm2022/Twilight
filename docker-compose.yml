# ============================================================================
# Twilight — Production Docker Compose
# ============================================================================
#
# Quick start:
#   1. Copy config.docker.toml → config.toml and edit secrets
#   2. Copy webui/.env.example → webui/.env and set NEXT_PUBLIC_API_URL
#   3. docker compose up -d
#
# Services:
#   postgres  — PostgreSQL 17 (state store + sessions)
#   redis     — Redis 7 (session sharing + rate limiting)
#   twilight  — Go backend (API + scheduler + bot, "all" mode)
#   webui     — Next.js frontend (standalone)
#
# Volumes:
#   postgres_data / redis_data — persisted databases
#   twilight_uploads / twilight_backups — user content + backups
#
# To run with split mode (API + scheduler + bot as separate containers),
# see docker-compose.split.yml or override the twilight command.
# ============================================================================

name: twilight

services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:17-alpine
    container_name: twilight-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: twilight
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-twilight}
      POSTGRES_DB: twilight
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twilight"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - twilight-net
    # Expose port only if you need external access; otherwise keep internal
    # ports:
    #   - "5432:5432"

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: twilight-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - twilight-net

  # ---- Go Backend (all mode: API + scheduler + bot) ----
  twilight:
    build:
      context: .
      dockerfile: Dockerfile
    image: twilight-backend:latest
    container_name: twilight-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Server
      TWILIGHT_GLOBAL_SERVER_NAME: ${SITE_NAME:-Twilight}
      TWILIGHT_LOG_LEVEL: ${LOG_LEVEL:-info}
      TWILIGHT_RUNTIME_LOG_LIMIT: ${RUNTIME_LOG_LIMIT:-5000}

      # Database (override config.toml values)
      TWILIGHT_DATABASE_DRIVER: postgres
      TWILIGHT_POSTGRES_HOST: postgres
      TWILIGHT_POSTGRES_PORT: 5432
      TWILIGHT_POSTGRES_USER: twilight
      TWILIGHT_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-twilight}
      TWILIGHT_POSTGRES_DATABASE: twilight
      TWILIGHT_POSTGRES_SSLMODE: disable

      # Redis (override config.toml values)
      TWILIGHT_REDIS_URL: redis://redis:6379/0

      # Health check endpoint
      TWILIGHT_API_HOST: 0.0.0.0
      TWILIGHT_API_PORT: 5000

      # Admin bootstrap (comma-separated usernames)
      TWILIGHT_ADMIN_USERNAMES: ${ADMIN_USERNAMES:-admin}

      # Security (generate a random secret for production)
      TWILIGHT_BOT_INTERNAL_SECRET: ${BOT_INTERNAL_SECRET:-}

    env_file:
      - path: .env
        required: false
    volumes:
      - ./config.toml:/app/config.toml:ro
      - twilight_uploads:/app/uploads
      - twilight_backups:/app/db/backups
    healthcheck:
      test: ["CMD", "./twilight", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - twilight-net
    # Expose API port to host (webui needs it, or use internal network)
    # In production, put Nginx/Caddy in front instead of exposing directly.
    # ports:
    #   - "5000:5000"

  # ---- Next.js Frontend ----
  webui:
    build:
      context: ./webui
      dockerfile: Dockerfile
    image: twilight-webui:latest
    container_name: twilight-webui
    restart: unless-stopped
    depends_on:
      twilight:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      # API URL — set to the backend service name for internal networking.
      # For production with a reverse proxy, set this to the public API URL.
      BACKEND_URL: ${BACKEND_URL:-http://twilight:5000}
    env_file:
      - path: webui/.env
        required: false
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - twilight-net
    ports:
      - "${WEBUI_PORT:-3000}:3000"

networks:
  twilight-net:
    driver: bridge
    name: twilight-net

volumes:
  postgres_data:
    name: twilight-postgres-data
  redis_data:
    name: twilight-redis-data
  twilight_uploads:
    name: twilight-uploads
  twilight_backups:
    name: twilight-backups
