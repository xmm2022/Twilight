# /etc/nginx/conf.d/rate-limit.conf
# Twilight 限流区域定义
#
# 放在 nginx.conf 的 http {} 块中 include，或直接复制到 http {} 块里。
# Go 后端已经支持 [RateLimit] 配置；这里作为反向代理外层保护，默认比旧配置宽松。

# 注册接口：每 IP 每 10 分钟约 30 次，允许短时突发。
limit_req_zone $binary_remote_addr zone=register:10m rate=3r/m;

# 登录接口：每 IP 每分钟约 60 次。
limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

# 通用 API：每 IP 每分钟约 1200 次。
limit_req_zone $binary_remote_addr zone=api_general:20m rate=20r/s;

# 全局连接数限制：每 IP 最大 100 个并发连接。
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
