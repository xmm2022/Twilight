# ============================================================
#  Twilight 生产环境配置模板
#  ------------------------------------------------------------
#  使用方法：复制此文件为 config.toml，再按真实环境修改。
#  覆盖优先级：环境变量 > config.toml > 程序默认值。
#  环境变量命名：TWILIGHT_{SECTION}_{KEY}，例：TWILIGHT_GLOBAL_SERVER_NAME。
#  程序启动时会自动备份 config.toml 到 config_backups/ 目录，
#  并把代码里新增但 toml 没有的配置项写回，无需手工补齐。
# ============================================================

# ───────── 全局 ─────────
[Global]
# 前端站点名称（标题栏/侧边栏）
server_name = "Twilight"
# 站点图标 URL，留空使用内置
server_icon = ""
# 是否输出运行日志
logging = true
# 日志级别：10=DEBUG / 20=INFO / 30=WARNING / 40=ERROR
log_level = 20
# 是否输出 SQLAlchemy ORM 日志（极其啰嗦，调试时再开）
sqlalchemy_log = false
# 出站 HTTP 请求失败时的最大重试次数
max_retry = 3
# SQLite 数据库文件目录（绝对或相对路径，相对则相对项目根）
databases_dir = "db"
# Redis 连接串；留空使用进程内内存（重启失效，仅单进程可用）
# 例：redis://[:password@]host:port/db
redis_url = ""
# 是否启用 Telegram Bot（关闭时所有 /tg 相关功能直接拒绝）
telegram_mode = false
# 是否强制所有用户绑定 Telegram 才能登录/注册
force_bind_telegram = false
# Bangumi 全局 API Token（可选；点格子不会把它作为用户兜底 Token）
bangumi_token = ""
# Bangumi API 地址（自建反代时可改）
bangumi_api_url = "https://api.bgm.tv"
# Bangumi App ID（OAuth，可选）
bangumi_app_id = ""
# TMDB API Key v3（https://www.themoviedb.org/settings/api）
tmdb_api_key = ""
# TMDB API 地址（如有镜像可改）
tmdb_api_url = "https://api.themoviedb.org/3"
# TMDB 图片 CDN
tmdb_image_url = "https://image.tmdb.org/t/p"

# ───────── Emby ─────────
[Emby]
# Emby/Jellyfin 服务器地址（后端访问，跟前端用户访问的可以不同）
emby_url = "http://127.0.0.1:8096/"
# Emby API Token（管理后台 → 高级 → API 密钥）
emby_token = ""
# 备用：API Token 失效时用用户名/密码鉴权
emby_username = ""
emby_password = ""
# 普通用户可见的播放线路：格式 "名称 : URL"
emby_url_list = [
  "直连 : http://your-server:8096/",
]
# 白名单 / 管理员专属线路
emby_url_list_for_whitelist = [
  "直连 : http://your-server:8096/",
]
# 普通用户新建/补建 Emby 账号后默认隐藏的媒体库名称；按 Emby 媒体库名称填写，留空不处理
emby_default_hidden_libraries = []
# 允许用户在个人设置中自行显示/隐藏的媒体库名称；留空关闭自助显隐入口
emby_self_service_libraries = []

# ───────── Telegram Bot ─────────
[Telegram]
# Telegram Bot API 基础地址（私有部署时可改，比如 https://my-tg-proxy/bot）
telegram_api_url = "https://api.telegram.org/bot"
# Bot Token（@BotFather）
bot_token = ""
# 管理员 Telegram ID 列表（数字）；Bot 内 /admin 命令仅向这些 ID 开放
admin_id = []
# 群组列表：可填数字 ID（如 -1001234567890）或 @用户名
group_id = []
# 频道列表：同上
channel_id = []
# 是否强制订阅指定群/频道才能使用（按 Bot 校验）
force_subscribe = false
# 是否启用完整内联面板（关闭后仅保留 /help /bind /me）
enable_tg_panel = false
# 强制要求绑定/已绑定用户保持在群组内；退群会被自动禁用并同步 Emby
require_group_membership = false
# 上面开启时的定时巡检间隔（分钟）
group_check_interval_minutes = 30
# 群组巡检 get_chat_member 并发数；过高可能触发 Telegram 限流
group_check_concurrency = 24
# 群组禁用/踢出/封禁等写操作并发数；建议低于巡检并发
group_action_concurrency = 8
# 退群完全封禁模式：开启后巡检发现退群用户会在所有 GROUP_ID 群里被永久 ban
#   • 永封通过 bot.ban_chat_member 实现（不会自动 unban），需要 Bot 是群管理员且有封禁权限
#   • 开启后巡检的"重新入群识别"分支会被跳过（永封后该分支不会命中）
#   • 谨慎开启：误判会导致用户永久无法回到群里
ban_on_leave = false
# Bot 出站代理（如 http://127.0.0.1:7890 / socks5://127.0.0.1:1080）
proxy_url = ""
# Bot 绑定确认回调（可填完整接口或后端基址；留空走默认）
bind_confirm_api_url = ""
# —— Bot 文案自定义（留空使用内置默认）
#   • 所有文本按 Markdown 渲染，自行转义 _ * [ 等特殊字符
#   • 可用占位符: {server_name}, {user_name}, {bot_username}
bot_start_text = ""     # /start 私聊完整文本；留空使用内置默认
bot_group_start_text = "" # 群组 /start 提示文本；留空使用内置默认
bot_start_title = ""    # /start 第一行标题
bot_start_intro = ""    # /start 简介段
bot_bind_prompt_text = "" # /bind 无参数时的绑定码输入提示
bot_help_text = ""      # /twihelp 完整文本；留空使用内置默认
bot_admin_help_text = "" # /twishelp 完整文本；留空使用内置默认
bot_help_header = ""    # 旧配置：内置 /twihelp 命令列表前段
bot_help_footer = ""    # 旧配置：内置 /twihelp 末尾段
bot_about = ""          # 关于 Bot / 服务说明（预留 /about 用）

# ───────── 注册 / 用户策略 ─────────
[SAR]
# 是否开放注册；首次部署强烈建议保持 false，后台开管理员后再放开
register_mode = false
# 是否强制必须使用注册码
register_code_limit = false
# 最大已注册用户数；超过后停止接收新注册
user_limit = 200
# 是否启用求片功能；默认关闭
media_request_enabled = false
# 每用户最多同时存在的求片数（待处理 + 下载中），-1 不限
max_concurrent_requests_per_user = -1
# 卡码生成格式，可包含自定义文本。
# 占位符：{random}=随机部分，{type}=register/renew/whitelist，{days}=账号天数，{index}=批量序号，{validity}=卡码有效期小时，{limit}=次数上限。
# 示例: TW-{type}-{random} / 银河列车-{days}-{random}
regcode_format = "code-{random}"
# 随机算法预设：hex20=20位十六进制；base32-16=易抄写大写字符；alnum-16=大写字母数字；digits-12=纯数字；uuid=UUID v4；legacy-sha1=旧版风格
regcode_random_algorithm = "hex20"
# 假卡码被已登录用户使用后的动作：none / disable_user / disable_user_and_deactivate_code
regcode_decoy_action = "disable_user"
# 是否允许无码注册（无注册码也能建系统账号；Emby 仍需事后补建）
allow_pending_register = true
# 无 Emby 账户的用户是否可查看部分页面（公告、签到等）
allow_no_emby_view = true

# —— Emby 自由注册（队列）
emby_direct_register_enabled = false
emby_direct_register_days = 30
# 可选套餐天数，-1 = 永久；前端会按顺序展示
emby_direct_register_day_options = [3, 7, 30, -1]
# 是否允许用户自己输入开通天数（在下面 min/max 范围内）
emby_direct_register_allow_custom_days = false
emby_direct_register_custom_days_min = 1
emby_direct_register_custom_days_max = 365
emby_direct_register_workers = 8
emby_direct_register_max_queue = 1000
emby_direct_register_status_ttl = 1800
# —— Emby 用户总上限（所有绑定了 Emby 的本地账号 + 标记 PENDING 的待补建数总和），-1 = 不限制
emby_user_limit = -1

# —— 管理员 / 白名单（优先 UID，逗号分隔）
# ⚠ 请改成你的真实 UID；空字符串表示"无管理员"
admin_uids = ""
admin_usernames = ""
white_list_uids = ""
white_list_usernames = ""

# —— 邀请树（已绑定 Emby 的用户可向下邀请；A 邀 B 邀 C 计 3 层）
invite_enabled = false
invite_limit = 10
invite_root_user_limit = -1
invite_max_depth = 3
invite_require_emby = true
invite_code_default_days = 30
# 邀请码格式；最终强制 inv- 前缀，支持 {random}/{uid}/{days}/{index}/{timestamp}
invite_code_format = "inv-{random}"

# —— 长期无 Emby 的悬空用户自动清理
auto_cleanup_no_emby = false
auto_cleanup_no_emby_days = 7

# —— 签到 / 积分（原 [Signin] 节并入此处。仅装饰用途，无排行榜）
# 命名说明：原 [Signin].enabled 改为 signin_enabled 避免与 SAR 整体开关混淆；
# 其余字段保持原名（currency_name / daily_min / ...）。
signin_enabled = true
currency_name = "星币"
daily_min = 5
daily_max = 20
streak_bonus_enabled = true
streak_bonus_days = [3, 7, 14, 30]
streak_bonus_points = [10, 50, 100, 300]
reset_after_miss = true

# ───────── 设备 / 并发流限制 ─────────
[DeviceLimit]
device_limit_enabled = false
max_devices = 5
max_streams = 2
# 超限时是否自动踢最早的会话
kick_oldest_session = false

# ───────── API 服务器 ─────────
[API]
# 监听地址；0.0.0.0 = 所有网卡
host = "0.0.0.0"
port = 5000
# 生产请保持 false；开启 debug 会回显堆栈、自动重载
debug = false
# 登录 Token 有效期（秒）；默认 10 天
token_expire = 864000
# 是否启用 CORS
cors_enabled = true
# ⚠ CORS 白名单：含 "*" 时浏览器禁用 Cookie（登录会失败）。
# 生产请显式列出前端域名，例：["https://app.example.com"]
cors_origins = []
# 文件上传目录（绝对路径或相对项目根目录），留空使用默认 uploads/
# upload_folder = "uploads"
# 单文件上传字节上限（默认 5 MiB）
# max_upload_size = 5242880
# —— 会话 Cookie ——
session_cookie_name = "twilight_session"
# 生产必须 true；HTTP 调试再临时关闭
session_cookie_secure = true
# 同站部署 Strict；前后端跨域必须 None（同时 secure=true）
session_cookie_samesite = "Strict"
# 留空用请求 Host；跨子域共享会话填顶级域 .example.com
session_cookie_domain = ""
session_cookie_path = "/"

# ───────── 安全 ─────────
[Security]
# 同一 IP 连续登录失败多少次后锁定
login_fail_threshold = 5
# 锁定时长（分钟），影响登录限流窗口
lockout_minutes = 30
# 仅凭 telegram_id 直登（高风险，生产保持 false）
telegram_direct_login_enabled = false
# 通过 API Key 直接换取 Web 会话 Token（高风险，生产保持 false）
apikey_direct_login_enabled = false
# Bot/外部系统调用内部接口的共享密钥；必须高熵随机字符串
# 生成示例：python -c "import secrets; print(secrets.token_urlsafe(48))"
bot_internal_secret = ""

# ───────── 定时任务 ─────────
# 各 job 的触发时间 / 间隔现在统一在「定时任务」页面按 job 维度调整，
# 下方字段仅作为「首次拉起或重置」时的默认值；运行时被 DB 中的 schedule 覆盖。
[Scheduler]
timezone = "Asia/Shanghai"
enabled = true
# 过期用户清理（HH:MM，默认值）
expired_check_time = "03:00"
# 即将过期提醒（默认值）
expiring_check_time = "09:00"
# 每日统计汇总（默认值）
daily_stats_time = "00:05"
# 会话清理间隔（小时，默认值）
session_cleanup_interval = 6
# Emby 用户同步间隔（小时，默认值）
emby_sync_interval = 6

# ───────── 系统自动更新 ─────────
[SystemUpdate]
# 默认关闭；开启后由 Scheduler 自动执行 git fetch/checkout/pull，不安装 Python 依赖
auto_update_enabled = false
# 自动更新使用的 Git 仓库和分支
repo_url = "https://github.com/Prejudice-Studio/Twilight.git"
branch = "main"
# Linux/systemd 环境下更新后重启 twilight / twilight-bot / twilight-scheduler
restart_services = true
# 自动更新时间类型：interval = 固定间隔；cron_daily = 每日固定时间
auto_update_trigger_type = "interval"
# 固定间隔模式：每多少小时更新一次
auto_update_interval_hours = 24
# 每日固定时间模式：HH:MM
auto_update_time = "04:00"

# ───────── 通知 ─────────
[Notification]
enabled = true
# 到期前几天提醒
expiry_remind_days = 3
# 新媒体入库是否广播
new_media_notify = false

# ───────── Bangumi 同步 ─────────
[BangumiSync]
# 开启后看完 Emby 自动在 BGM 标记进度（每个用户必须配置自己的 Token）
enabled = false
# Emby Webhook 共享密钥；建议设置并在通知 URL 后追加 ?token=该值
webhook_secret = ""
auto_add_collection = true
private_collection = true
# 命中关键词的条目不同步
block_keywords = []
# 播放进度达到多少 % 才算"看完"
min_progress_percent = 80

# ───────── 签到 / 积分（已并入 [SAR] 节，本段保留为旧版升级提示）─────────
# 原 [Signin] 节自 v1.x 起已并入 [SAR]：
#   - enabled              → signin_enabled
#   - currency_name        → currency_name
#   - daily_min/daily_max  → daily_min/daily_max
#   - streak_bonus_*       → streak_bonus_*
#   - reset_after_miss     → reset_after_miss
# 启动时若仍存在独立的 [Signin] 节，会被自动迁移到 [SAR] 并清理掉；
# 无需手动改动，但模板里不再保留该节以免误导。
